name: Run Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]
        laravel: [ '10.*', '11.*', '12.*', '13.*' ]
        include:
          - laravel: '10.*'
            testbench: '^8.0'
          - laravel: '11.*'
            testbench: '^9.0'
          - laravel: '12.*'
            testbench: '^10.0'
          - laravel: '13.*'
            testbench: '^11.0'
        exclude:
          - php: '8.2'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        env:
          COMPOSER_AUDIT_ABANDONED: ignore
          COMPOSER_NO_BLOCKING: 1
        run: |
          
          if [[ "${{ matrix.laravel }}" == "12.*" || "${{ matrix.laravel }}" == "13.*" ]]; then
            composer remove --dev larastan/larastan --no-interaction --no-update --no-audit || true
          fi

          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update --no-audit
          composer update --prefer-dist --no-interaction --no-progress --no-audit

      - name: Execute tests
        run: vendor/bin/phpunit tests --do-not-fail-on-warning