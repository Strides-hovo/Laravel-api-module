name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches:
      # Workflow срабатывает только при пуше в ветку с исходниками лендинга
      - landing-source

# Права для записи в gh-pages и публикации
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist          # Папка с результатом сборки Vite
          branch: gh-pages      # Ветка, куда деплоится готовый сайт