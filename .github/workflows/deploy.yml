name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches:
      - landing-source # Пушим в ветку исходников сайтов

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем актуальную Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          # Указываем, где именно лежит package-lock.json
          cache-dependency-path: 'landing/package-lock.json'

      # Устанавливаем зависимости из подпапки landing
      - name: Install dependencies
        run: npm ci
        working-directory: ./landing

      # Собираем проект Vite из подпапки landing
      - name: Build project
        run: npm run build
        working-directory: ./landing

      # Настраиваем деплой в GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Загружаем собранные статические файлы из landing/dist
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './landing/dist'

      # Публикуем на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4